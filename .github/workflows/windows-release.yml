name: Windows Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-build.txt
      - name: Install build requirements
        run: python -m pip install -r requirements-build.txt
      - name: Run tests
        run: python -m pytest -q

  build:
    needs: test
    runs-on: windows-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-build.txt
      - name: Install build requirements
        run: python -m pip install -r requirements-build.txt
      - name: Build executable
        run: python -m PyInstaller --noconfirm --clean DesktopCleaner.spec
      - name: Validate release metadata and create checksum
        id: metadata
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = python scripts/release_contract.py --tag "$env:RELEASE_TAG" --artifact "dist\DesktopCleaner.exe"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $version = $version.Trim()
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath "dist\DesktopCleaner.exe").Hash.ToLowerInvariant()
          "$hash  DesktopCleaner.exe" | Set-Content -LiteralPath "dist\DesktopCleaner.exe.sha256" -Encoding ascii
          "version=$version" >> $env:GITHUB_OUTPUT
          "artifact_name=DesktopCleaner-v$version-windows-x64" >> $env:GITHUB_OUTPUT
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: |
            dist\DesktopCleaner.exe
            dist\DesktopCleaner.exe.sha256
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist
      - name: Ensure release does not already exist
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          $ErrorActionPreference = "Stop"
          $encodedTag = [System.Uri]::EscapeDataString($env:RELEASE_TAG)
          $uri = "https://api.github.com/repos/$env:RELEASE_REPOSITORY/releases/tags/$encodedTag"
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $response = Invoke-WebRequest -Uri $uri -Headers $headers -SkipHttpErrorCheck
          switch ([int]$response.StatusCode) {
            200 {
              throw "Release '$env:RELEASE_TAG' already exists."
            }
            404 {
              Write-Host "Release '$env:RELEASE_TAG' does not exist."
            }
            default {
              throw "Release lookup failed with HTTP status $($response.StatusCode)."
            }
          }
      - name: Create release
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          gh release create "$env:RELEASE_TAG" `
            --repo "$env:RELEASE_REPOSITORY" `
            --verify-tag `
            --title "DesktopCleaner $env:RELEASE_TAG" `
            --generate-notes `
            "dist/DesktopCleaner.exe" `
            "dist/DesktopCleaner.exe.sha256"
